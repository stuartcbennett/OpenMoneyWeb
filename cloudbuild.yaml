steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/openmoneyweb:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/openmoneyweb:latest
      - .

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/openmoneyweb']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - openmoneyweb
      - --image=gcr.io/$PROJECT_ID/openmoneyweb:$COMMIT_SHA
      - --region=northamerica-northeast1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=ConnectionStrings__DefaultConnection=$$DB_CONNECTION
    secretEnv: ['DB_CONNECTION']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/db-connection-string/versions/latest
      env: 'DB_CONNECTION'

images:
  - gcr.io/$PROJECT_ID/openmoneyweb
